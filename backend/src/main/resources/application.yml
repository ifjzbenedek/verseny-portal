server:
  port: 8081
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:postgresql://localhost:5432/portal
    username: portal
    password: portal
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: change-me-in-prod-this-must-be-at-least-32-bytes-long-secret-key-xx
    expiration-ms: 86400000
  cors:
    origins: http://localhost:5173,http://localhost:4173

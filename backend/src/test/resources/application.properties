# Test profile: H2 in-memory, no Postgres needed, ddl from JPA each run.
spring.datasource.url=jdbc:h2:mem:portal-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never

# Avoid loading the production CORS origins value during slice tests.
app.cors.origins=http://localhost:5173
app.jwt.secret=test-secret-needs-to-be-at-least-32-bytes-long-padding-here-padding
app.jwt.expiration-ms=86400000

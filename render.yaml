services:
  - type: web
    name: verseny-backend
    runtime: docker
    rootDir: backend
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8081
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: 86400000
      # Following must be set in Render dashboard from Supabase "Session pooler" connection string
      # (Settings → Database → Connection string → "Session pooler" mode, port 5432, IPv4)
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # Set this AFTER Vercel deploy returns the URL; comma-separated, no trailing slash
      - key: CORS_ORIGINS
        sync: false

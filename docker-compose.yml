services:
  db:
    image: postgres:15-alpine
    container_name: portal-db
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
    ports:
      - "5432:5432"
    volumes:
      - portal-data:/var/lib/postgresql/data
  # CHATBOT_SERVICE_PLACEHOLDER — Window C adds chatbot service here

volumes:
  portal-data:

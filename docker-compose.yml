services:
  db:
    image: postgres:15-alpine
    container_name: portal-db
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
    ports:
      - "5432:5432"
    volumes:
      - portal-data:/var/lib/postgresql/data
  chatbot:
    build: ./chatbot
    container_name: portal-chatbot
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-this-must-be-at-least-32-bytes-long-secret-key-xx}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MONOLITH_BASE_URL: ${MONOLITH_BASE_URL:-http://host.docker.internal:8081}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  portal-data:
